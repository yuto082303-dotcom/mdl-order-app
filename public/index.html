function getTgt(){if(!S.done)return 0;var si=findIdx(S.sn),ei=findIdx(S.en);return(si<0||ei<0||si>ei)?0:ei-si+1;}
function doCalcAll(){var np=getNP();return PARTS.map(function(p){
  var nextW=0,wk=0,normal=0,auto=0;

  }

    // 最低在庫パーツ：在庫が最低在庫以下なら不足分を発注

  }
  // 通常の即納計算
  nextW=S.done&&S.instOn?Math.round(p.avg10*S.days):0;
  wk=S.done&&S.instOn?(p.wk||0):0;

  var sur=S.done?(p.s-nextW-wk-normal):p.s;
  auto=S.done&&sur<0&&p.instant&&S.instOn?-sur:0;
  return{c:p.c,n:p.n,s:p.s,p:p.p,avg10:p.avg10,wk:p.wk||0,nextW:nextW,normal:normal,sur:sur,auto:auto,instant:p.instant,lt:false,ltTh:0,minStock:0};
