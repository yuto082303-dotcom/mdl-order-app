function fmtDateISO(d){var y=d.getFullYear(),m=('0'+(d.getMonth()+1)).slice(-2),dd=('0'+d.getDate()).slice(-2);return y+'-'+m+'-'+dd;}
function fmtDateJP(iso){if(!iso)return'';var p=iso.split('-');return parseInt(p[1])+'/'+parseInt(p[2]);}
function getNextWed(){var d=new Date();d.setHours(0,0,0,0);var dow=d.getDay();var add=(3-dow+7)%7;if(add===0)add=7;d.setDate(d.getDate()+add);return d;}
function calcDaysFromToday(iso){var t=new Date(iso+'T00:00:00');var today=new Date();today.setHours(0,0,0,0);return Math.max(1,Math.ceil((t-today)/(1000*60*60*24)));}
function getTodayISO(){return fmtDateISO(new Date());}
var DOW_NAMES=['\u65e5','\u6708','\u706b','\u6c34','\u6728','\u91d1','\u571f'];
function getDOW(iso){var d=new Date(iso+'T00:00:00');return DOW_NAMES[d.getDay()];}
var S={targetDate:fmtDateISO(getNextWed()),days:calcDaysFromToday(fmtDateISO(getNextWed())),cat:"\u3059\u3079\u3066",q:"",ov:{},sa:false,view:"dash",budget:30000000,sn:"",en:"",done:false,adj:false,instOn:true,ltFilter:false,trackDate:''};
var bEdit=false;

function normName(s){return String(s||'').replace(/[\s\u3000\r\n]/g,'').toLowerCase();}
function findIdx(name){var nk=normName(name);if(!nk)return-1;for(var i=0;i<ORDERS.length;i++){if(normName(ORDERS[i].name)===nk)return i;}for(var i=0;i<ORDERS.length;i++){if(normName(ORDERS[i].name).indexOf(nk)===0)return i;}for(var i=0;i<ORDERS.length;i++){if(normName(ORDERS[i].name).indexOf(nk)>=0)return i;}return-1;}
function getNP(){var np={};if(!S.done)return np;var si=findIdx(S.sn),ei=findIdx(S.en);if(si<0||ei<0||si>ei)return np;for(var i=si;i<=ei;i++){ORDERS[i].parts.forEach(function(pn){np[pn]=(np[pn]||0)+1;});}return np;}
function getTgt(){if(!S.done)return 0;var si=findIdx(S.sn),ei=findIdx(S.en);return(si<0||ei<0||si>ei)?0:ei-si+1;}
function toggleLtFilter(){S.ltFilter=!S.ltFilter;if(S.ltFilter){S.sa=true;S.cat='\u3059\u3079\u3066';S.q='';}render();}

function saveShipment(row,dayIndex,value){
  var v=parseInt(value)||0;
  fetch('/api/shipment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({row:row,dayIndex:dayIndex,value:v})})
  .then(function(r){return r.json();})
  .then(function(res){
    if(res.success){
      TRACK_DATA.forEach(function(g){
        g.items.forEach(function(item){
          if(item.row===row){
            item.shipped[dayIndex]=v;
            var total=item.shipped.reduce(function(s,x){return s+x;},0);
            item.remaining=Math.max(0,item.qty-total);
          }
        });
      });
      render();
    }
  });
}

function doCalcAll(){
  var np=getNP();
  return PARTS.map(function(p){
    var normal=np[p.n]||0;
    if(p.ia&&p.avg7>0){
      var nextW=S.done&&S.instOn?Math.round(p.avg7*S.days):0;
      var sur=S.done?(S.instOn?(p.s-nextW-normal):(p.s-normal)):p.s;
      var auto=S.done&&sur<0?-sur:0;
      return{c:p.c,n:p.n,s:p.s,sRaw:p.sRaw||p.s,arrival:p.arrival||0,p:p.p,avg10:p.avg7,wk:0,nextW:nextW,normal:normal,sur:sur,auto:auto,instant:false,lt:false,ltTh:0,minStock:0,ia:true};
    }
    if(p.lt){
      var nextW=S.instOn?Math.round(p.avg10*S.days):0;
      var sur=S.instOn?(p.s-nextW-normal):(p.s-normal);
      var auto=sur<0?-sur:0;
      return{c:p.c,n:p.n,s:p.s,sRaw:p.sRaw||p.s,arrival:p.arrival||0,p:p.p,avg10:p.avg10,wk:0,nextW:nextW,normal:normal,sur:sur,auto:auto,instant:false,lt:true,ltTh:p.ltTh,minStock:0,ia:false};
    }
    if(p.minStock>0){
      var sur=p.s-p.minStock-(S.done?normal:0);
      var auto=S.done&&sur<0?-sur:0;
      return{c:p.c,n:p.n,s:p.s,sRaw:p.sRaw||p.s,arrival:p.arrival||0,p:p.p,avg10:p.avg10,wk:0,nextW:0,normal:normal,sur:sur,auto:auto,instant:false,lt:false,ltTh:0,minStock:p.minStock,ia:false};
    }
    var nextW=S.done&&S.instOn&&p.instant?Math.round(p.avg10*S.days):0;
    var sur=S.done?(p.instant&&S.instOn?(p.s-nextW-normal):(p.s-normal)):p.s;
    var auto=S.done&&sur<0?(p.instant&&S.instOn?-sur:(normal>0?-sur:0)):0;
    return{c:p.c,n:p.n,s:p.s,sRaw:p.sRaw||p.s,arrival:p.arrival||0,p:p.p,avg10:p.avg10,wk:0,nextW:nextW,normal:normal,sur:sur,auto:auto,instant:p.instant,lt:false,ltTh:0,minStock:0,ia:false};
  });
}

function sortL(list){return list.slice().sort(function(a,b){var ai=PO.indexOf(a.n),bi=PO.indexOf(b.n);if(ai<0)ai=9999;if(bi<0)bi=9999;return ai-bi;});}
function doCalcBtn(){S.sn=(document.getElementById('inp-s')||{}).value||'';S.en=(document.getElementById('inp-e')||{}).value||'';S.targetDate=(document.getElementById('inp-date')||{}).value||fmtDateISO(getNextWed());S.days=calcDaysFromToday(S.targetDate);S.done=true;S.ov={};S.ltFilter=false;render();}
function doClear(){S.sn='';S.en='';S.done=false;S.ov={};S.targetDate=fmtDateISO(getNextWed());S.days=calcDaysFromToday(S.targetDate);S.adj=false;S.ltFilter=false;render();}
function doReset(){S.done=false;S.ov={};S.adj=false;S.ltFilter=false;render();}
function toggleAdj(){S.adj=!S.adj;render();}

function doSubmitOrder(){
  if(!S.done){alert('\u5148\u306b\u8a08\u7b97\u3057\u3066\u304f\u3060\u3055\u3044');return;}
  var all=sortL(doCalcAll());var items=[];
  all.forEach(function(p){var q=gQ(p.n,p.auto);if(q>0)items.push({name:p.n,price:p.p,qty:q,total:q*p.p,cat:p.c});});
  if(!items.length){alert('\u767a\u6ce8\u30d1\u30fc\u30c4\u304c\u3042\u308a\u307e\u305b\u3093');return;}
  var tC=items.reduce(function(s,i){return s+i.total;},0);
  if(!confirm('\u767a\u6ce8\u3092\u78ba\u5b9a\u3057\u307e\u3059\u304b\uff1f\n\n'+items.length+'\u7a2e / '+items.reduce(function(s,i){return s+i.qty;},0)+'\u500b\n\u5408\u8a08: \u00a5'+tC.toLocaleString()))return;
  var btn=document.getElementById('submit-btn');
  if(btn){btn.textContent='\u9001\u4fe1\u4e2d...';btn.disabled=true;}
  fetch('/api/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:items,totalAmount:tC})})
  .then(function(r){return r.json();})
  .then(function(res){
    if(res.success){
      alert('\u767a\u6ce8\u78ba\u5b9a\uff01\n'+res.items+'\u7a2e');
      if(btn){btn.textContent='\u2713 \u767a\u6ce8\u6e08\u307f';btn.style.background='#1a7f37';}
      fetch('/api/parts').then(function(r){return r.json();}).then(function(data){
        PARTS=data.parts||[];ORDERS=data.orders||[];TRACK_DATA=data.trackData||[];
        S.view='track';S.trackDate='';render();
      });
    }
  }).catch(function(err){
    alert('\u30a8\u30e9\u30fc: '+err.message);
    if(btn){btn.textContent='\u767a\u6ce8\u78ba\u5b9a';btn.disabled=false;}
  });
}

function buildRows(f){
  var h='',lc='',cols=S.adj?10:9;
  f.forEach(function(p){
    if(p.c!==lc){lc=p.c;h+='<tr class="cat-hdr"><td colspan="'+cols+'"><span class="cd" style="background:'+(CC[p.c]||'#6d7175')+'"></span>\u3010'+p.c+'\u3011</td></tr>';}

}

  render();
}).catch(function(err){
  document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:#d72c0d">\u30a8\u30e9\u30fc: '+err.message+'<br><br><button onclick="location.reload()" style="padding:8px 16px;cursor:pointer;border-radius:8px;border:1px solid #c9cccf">\u518d\u8a66\u884c</button></div>';
});
</script></body></html>
